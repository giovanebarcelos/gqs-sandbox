[pytest]
; Marca esta pasta como rootdir do pytest, mesmo quando o comando
; `pytest` é executado de dentro de uma subpasta (ex.: ex01_calculadora_test/).
; Isso garante que o conftest.py deste diretório (que registra o sys.path
; de cada exercício) seja sempre carregado, reproduzindo o comportamento
; real de projetos pytest com conftest.py compartilhado.
